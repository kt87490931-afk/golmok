<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="js/mobile-route.js"></script>
<title>골목대장 — 비밀번호 재설정</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Noto Sans KR',sans-serif;background:#F7F3EB;display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px;}
.card{background:#fff;border-radius:16px;padding:32px 24px;width:100%;max-width:400px;text-align:center;}
input{width:100%;border:1px solid #E8E4DC;border-radius:10px;padding:12px 14px;font-size:14px;outline:none;margin-bottom:10px;}
button.primary{width:100%;background:#F5A623;color:#fff;border:none;border-radius:12px;padding:13px;font-size:14px;font-weight:700;cursor:pointer;}
button.primary:disabled{opacity:.55;cursor:not-allowed;}
.hint{font-size:12px;color:#999;margin-bottom:16px;line-height:1.5;}
.error{color:#E24B4A;font-size:13px;margin-top:8px;display:none;text-align:left;line-height:1.5;}
.success{color:#1D9E75;font-size:13px;margin-top:8px;display:none;}
</style>
<link rel="stylesheet" href="css/responsive.css?v=20260642">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/main-v3.css?v=20260654">
<link rel="stylesheet" href="css/shell-pages.css?v=20260654">
</head>
<body data-gm-active="home" data-gm-shell="auth">
<div class="card">
  <div style="font-size:48px;margin-bottom:16px;">🔐</div>
  <h2 style="font-size:20px;font-weight:700;margin-bottom:8px;">새 비밀번호 설정</h2>
  <p class="hint" id="reset-hint">재설정 링크를 확인하는 중입니다...</p>
  <input type="password" id="new-password" placeholder="새 비밀번호 (8자 이상)" disabled>
  <input type="password" id="new-password-confirm" placeholder="비밀번호 확인" disabled>
  <button type="button" class="primary" id="btn-reset" disabled>비밀번호 변경</button>
  <div class="error" id="reset-error"></div>
  <div class="success" id="reset-success"></div>
  <p style="margin-top:16px;"><a href="/" style="font-size:13px;color:#C17F24;">메인으로 돌아가기</a></p>
</div>
<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';
import { SUPABASE_URL, SUPABASE_ANON_KEY } from './js/supabase_config.js';

const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
  auth: {
    detectSessionInUrl: true,
    persistSession: true,
    autoRefreshToken: true,
  },
});

const hintEl = document.getElementById('reset-hint');
const btn = document.getElementById('btn-reset');
const pw1 = document.getElementById('new-password');
const pw2 = document.getElementById('new-password-confirm');
const errEl = document.getElementById('reset-error');
const okEl = document.getElementById('reset-success');

function showError(msg) {
  if (!errEl) return;
  errEl.textContent = msg;
  errEl.style.display = 'block';
  if (okEl) okEl.style.display = 'none';
}

function showSuccess(msg) {
  if (!okEl) return;
  okEl.textContent = msg;
  okEl.style.display = 'block';
  if (errEl) errEl.style.display = 'none';
}

function enableForm() {
  if (hintEl) hintEl.textContent = '새 비밀번호를 입력해주세요.';
  pw1.disabled = false;
  pw2.disabled = false;
  btn.disabled = false;
}

/** 이메일 링크의 code(PKCE) 또는 hash(recovery) 로 세션 확보 */
async function establishRecoverySession() {
  const url = new URL(window.location.href);
  const code = url.searchParams.get('code');

  if (code) {
    const { error } = await supabase.auth.exchangeCodeForSession(code);
    if (error) throw error;
    window.history.replaceState({}, document.title, url.pathname);
    return true;
  }

  const hash = window.location.hash.startsWith('#') ? window.location.hash.slice(1) : '';
  const hashParams = new URLSearchParams(hash);
  const accessToken = hashParams.get('access_token');
  const refreshToken = hashParams.get('refresh_token');

  if (accessToken && refreshToken) {
    const { error } = await supabase.auth.setSession({
      access_token: accessToken,
      refresh_token: refreshToken,
    });
    if (error) throw error;
    window.history.replaceState({}, document.title, url.pathname);
    return true;
  }

  if (hash) {
    const { data, error } = await supabase.auth.getSession();
    if (error) throw error;
    if (data.session) {
      window.history.replaceState({}, document.title, url.pathname);
      return true;
    }
  }

  const { data: { session }, error } = await supabase.auth.getSession();
  if (error) throw error;
  if (session) return true;

  return new Promise((resolve, reject) => {
    let sub;
    const timeout = setTimeout(() => {
      sub?.unsubscribe();
      reject(new Error('recovery_timeout'));
    }, 8000);

    const { data } = supabase.auth.onAuthStateChange((event, nextSession) => {
      if (event === 'PASSWORD_RECOVERY' || (event === 'SIGNED_IN' && nextSession)) {
        clearTimeout(timeout);
        sub?.unsubscribe();
        resolve(true);
      }
    });
    sub = data.subscription;
  });
}

let sessionReady = false;

try {
  await establishRecoverySession();
  sessionReady = true;
  enableForm();
} catch (e) {
  console.error('recovery session', e);
  if (hintEl) {
    hintEl.textContent =
      '재설정 링크가 만료되었거나 유효하지 않습니다. 로그인 화면에서 비밀번호 찾기를 다시 시도해주세요.';
  }
  showError(
    '인증 링크를 확인할 수 없습니다. 메일의 최신 링크를 사용했는지 확인하거나, 비밀번호 찾기를 다시 요청해주세요.'
  );
}

btn?.addEventListener('click', async () => {
  if (!sessionReady) {
    showError('재설정 세션이 없습니다. 메일의 링크로 다시 접속해주세요.');
    return;
  }

  const pw = pw1?.value;
  const pwc = pw2?.value;

  if (errEl) errEl.style.display = 'none';
  if (okEl) okEl.style.display = 'none';

  if (!pw || pw.length < 8) {
    showError('비밀번호는 8자 이상 입력해주세요.');
    return;
  }
  if (pw !== pwc) {
    showError('비밀번호가 일치하지 않습니다.');
    return;
  }

  btn.disabled = true;
  btn.textContent = '변경 중...';

  const { error } = await supabase.auth.updateUser({ password: pw });

  btn.disabled = false;
  btn.textContent = '비밀번호 변경';

  if (error) {
    console.error('updateUser', error);
    const msg = error.message || '';
    if (msg.includes('session') || msg.includes('Session')) {
      showError('재설정 세션이 만료되었습니다. 비밀번호 찾기를 다시 요청해주세요.');
    } else if (msg.includes('same')) {
      showError('이전과 동일한 비밀번호는 사용할 수 없습니다.');
    } else {
      showError(`비밀번호 변경에 실패했습니다. (${msg})`);
    }
    return;
  }

  showSuccess('비밀번호가 변경되었습니다. 잠시 후 메인으로 이동합니다.');
  setTimeout(() => {
    window.location.href = '/';
  }, 2000);
});
</script>
<script type="module" src="js/shell_loader.js?v=20260654"></script>
</body>
</html>
