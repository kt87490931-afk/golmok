<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>골목대장 — 비밀번호 재설정</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Noto Sans KR',sans-serif;background:#F7F3EB;display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px;}
.card{background:#fff;border-radius:16px;padding:32px 24px;width:100%;max-width:400px;text-align:center;}
input{width:100%;border:1px solid #E8E4DC;border-radius:10px;padding:12px 14px;font-size:14px;outline:none;margin-bottom:10px;}
button.primary{width:100%;background:#F5A623;color:#fff;border:none;border-radius:12px;padding:13px;font-size:14px;font-weight:700;cursor:pointer;}
.error{color:#E24B4A;font-size:13px;margin-top:8px;display:none;}
.success{color:#1D9E75;font-size:13px;margin-top:8px;display:none;}
</style>
</head>
<body>
<div class="card">
  <div style="font-size:48px;margin-bottom:16px;">🔐</div>
  <h2 style="font-size:20px;font-weight:700;margin-bottom:8px;">새 비밀번호 설정</h2>
  <p style="font-size:13px;color:#999;margin-bottom:24px;">새 비밀번호를 입력해주세요.</p>
  <input type="password" id="new-password" placeholder="새 비밀번호 (8자 이상)">
  <input type="password" id="new-password-confirm" placeholder="비밀번호 확인">
  <button type="button" class="primary" id="btn-reset">비밀번호 변경</button>
  <div class="error" id="reset-error"></div>
  <div class="success" id="reset-success"></div>
</div>
<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';
import { SUPABASE_URL, SUPABASE_ANON_KEY } from './js/supabase_config.js';

const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

document.getElementById('btn-reset')?.addEventListener('click', async () => {
  const pw = document.getElementById('new-password')?.value;
  const pwc = document.getElementById('new-password-confirm')?.value;
  const err = document.getElementById('reset-error');
  const ok = document.getElementById('reset-success');

  if (err) err.style.display = 'none';
  if (ok) ok.style.display = 'none';

  if (!pw || pw.length < 8) {
    if (err) { err.textContent = '비밀번호는 8자 이상 입력해주세요.'; err.style.display = 'block'; }
    return;
  }
  if (pw !== pwc) {
    if (err) { err.textContent = '비밀번호가 일치하지 않습니다.'; err.style.display = 'block'; }
    return;
  }

  const { error } = await supabase.auth.updateUser({ password: pw });
  if (error) {
    if (err) { err.textContent = '비밀번호 변경에 실패했습니다.'; err.style.display = 'block'; }
    return;
  }

  if (ok) {
    ok.textContent = '비밀번호가 변경되었습니다. 메인으로 이동합니다.';
    ok.style.display = 'block';
  }
  setTimeout(() => { window.location.href = '/'; }, 2000);
});
</script>
</body>
</html>
