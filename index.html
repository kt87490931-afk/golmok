<script>
function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2200);
}

// AI 채팅 미리보기
const aiMsgs = document.getElementById('ai-messages');
const aiResponses = ['더 자세히 알려주세요!', '소진공 데이터 기준으로 분석하고 있어요.', '해당 업종의 상권 분석을 시작할게요.', '잠시만요, 데이터를 불러오고 있어요...', '좋은 질문이에요! 관련 정보를 찾아볼게요.'];
function addAiMsg(text, isUser) {
  if (!aiMsgs) return;
  const div = document.createElement('div');
  div.className = isUser ? 'chat-b user' : 'chat-b ai';
  div.textContent = text;
  aiMsgs.appendChild(div);
  aiMsgs.scrollTop = aiMsgs.scrollHeight;
}
window.sendAI = function () {
  const val = document.getElementById('ai-input')?.value?.trim();
  if (!val) return;
  addAiMsg(val, true);
  document.getElementById('ai-input').value = '';
  setTimeout(() => addAiMsg(aiResponses[Math.floor(Math.random() * aiResponses.length)], false), 700);
};
document.getElementById('ai-send-preview')?.addEventListener('click', () => window.doSearch?.());
document.getElementById('write-btn-m')?.addEventListener('click', () => document.getElementById('open-write')?.click());
</script>

<script type="module">
import { getApiKey } from './js/api-config.js';
async function loadHeroMap() {
  const iframe = document.getElementById('hero-map-iframe');
  if (!iframe) return;
  const certKey = await getApiKey('SOJANGGONG_STARTUP_KEY');
  if (certKey && !certKey.startsWith('YOUR_')) {
    iframe.src = `https://bigdata.sbiz.or.kr/#/openApi/startupPublic?certKey=${encodeURIComponent(certKey)}`;
  }
}
loadHeroMap();
window.setQ = function (q) {
  const inp = document.getElementById('ai-input');
  if (inp) { inp.value = q; inp.focus(); }
};
window.doSearch = function () {
  const v = document.getElementById('ai-input')?.value?.trim();
  if (v && window.sendAI) window.sendAI();
  else if (v) document.querySelector('[data-open-analysis]')?.click();
};
window.focusHeroSearch = function () {
  document.getElementById('ai-input')?.focus();
  window.scrollTo({ top: 0, behavior: 'smooth' });
};
window.startVoice = function () { showToast('음성검색 준비 중입니다'); };
window.changeRegion = function () { showToast('지역 변경은 프로필 설정에서 가능합니다'); };
</script>
