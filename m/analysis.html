<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#F5A623">
<script src="js/desktop-route.js"></script>
<link rel="icon" href="assets/gmlogo.png" type="image/png">
<title>상권분석 - 골목대장</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css">
<link rel="stylesheet" href="../css/main-v3.css?v=20260663">
<link rel="stylesheet" href="../css/main-v3-m.css?v=20260663">
<link rel="stylesheet" href="../css/shell-pages.css?v=20260663">
<link rel="stylesheet" href="../css/analysis-tabs.css?v=20260659">
</head>
<body class="m-shell gm-shell-analysis" data-gm-active="analysis" data-gm-shell="analysis">

<template id="gm-page-tpl">
  <div class="sbiz-analysis-wrap">
    <div class="analysis-tab-bar" role="tablist">
      <div class="tab-group" id="group-status">
        <button type="button" class="tab-group-btn active" data-group="status" aria-expanded="true">
          <i class="ti ti-map"></i>
          상권현황
          <i class="ti ti-chevron-down group-arrow"></i>
        </button>
        <div class="tab-group-menu open" id="menu-status">
          <button type="button" class="tab-sub-btn active" data-tab="map"><i class="ti ti-map-2"></i> 상권지도 <span class="tab-badge live">LIVE</span></button>
          <button type="button" class="tab-sub-btn" data-tab="weather"><i class="ti ti-cloud"></i> 창업기상도 <span class="tab-badge live">LIVE</span></button>
          <button type="button" class="tab-sub-btn" data-tab="hotplace"><i class="ti ti-flame"></i> 핫플레이스 <span class="tab-badge live">LIVE</span></button>
        </div>
      </div>
      <div class="tab-group-divider"></div>
      <div class="tab-group" id="group-analysis">
        <button type="button" class="tab-group-btn" data-group="analysis" aria-expanded="false">
          <i class="ti ti-chart-bar"></i>
          상권분석
          <i class="ti ti-chevron-down group-arrow"></i>
        </button>
        <div class="tab-group-menu" id="menu-analysis">
          <button type="button" class="tab-sub-btn" data-tab="store"><i class="ti ti-store"></i> 업소현황 <span class="tab-badge live">LIVE</span></button>
          <button type="button" class="tab-sub-btn" data-tab="simple"><i class="ti ti-bolt"></i> 간단분석 <span class="tab-badge coming">준비중</span></button>
          <button type="button" class="tab-sub-btn" data-tab="detail"><i class="ti ti-search"></i> 상세분석 <span class="tab-badge coming">준비중</span></button>
        </div>
      </div>
      <div class="tab-group-divider"></div>
      <div class="tab-group" id="group-theme">
        <button type="button" class="tab-group-btn" data-group="theme" aria-expanded="false">
          <i class="ti ti-chart-dots"></i>
          테마분석
          <i class="ti ti-chevron-down group-arrow"></i>
        </button>
        <div class="tab-group-menu" id="menu-theme">
          <button type="button" class="tab-sub-btn" data-tab="theme"><i class="ti ti-building-store"></i> 테마상권 <span class="tab-badge live">LIVE</span></button>
          <button type="button" class="tab-sub-btn" data-tab="sns"><i class="ti ti-brand-instagram"></i> SNS분석 <span class="tab-badge coming">준비중</span></button>
          <button type="button" class="tab-sub-btn" data-tab="delivery"><i class="ti ti-bike"></i> 배달분석 <span class="tab-badge coming">준비중</span></button>
          <button type="button" class="tab-sub-btn" data-tab="festival"><i class="ti ti-confetti"></i> 관광축제 <span class="tab-badge coming">준비중</span></button>
          <button type="button" class="tab-sub-btn" data-tab="history"><i class="ti ti-calendar"></i> 업력현황 <span class="tab-badge coming">준비중</span></button>
          <button type="button" class="tab-sub-btn" data-tab="sales"><i class="ti ti-trending-up"></i> 매출추이 <span class="tab-badge coming">준비중</span></button>
        </div>
      </div>
    </div>
    <div class="sbiz-iframe-shell">
      <div id="analysis-iframe-loading" class="analysis-iframe-loading">상권지도 불러오는 중...</div>
      <iframe id="analysis-iframe" title="소상공인365 상권분석" loading="lazy" allow="geolocation"></iframe>
    </div>
  </div>
</template>

<script type="module" src="../js/shell_loader.js?v=20260659"></script>
<script type="module" src="js/auth.js?v=20260659"></script>
<script type="module" src="../js/pages/analysis_page.js?v=20260659"></script>
</body>
</html>
