<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#F5A623">
<script src="js/desktop-route.js"></script>
<link rel="icon" href="assets/gmlogo.png" type="image/png">
<title>AI 검색 - 골목대장</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css">
<link rel="stylesheet" href="../css/main-v3.css?v=20260680">
<link rel="stylesheet" href="../css/main-v3-m.css?v=20260680">
<link rel="stylesheet" href="../css/shell-pages.css?v=20260680">
<link rel="stylesheet" href="../css/ai-chat.css?v=20260690">
<link rel="stylesheet" href="../css/ai-chat-v4.css?v=20260002">
</head>
<body class="m-shell gm-shell-ai" data-gm-active="ai" data-gm-shell="ai">

<template id="gm-page-tpl">
  <div class="ai-page-wrap">

    <aside class="ai-history-panel" id="aiHistPanel">
      <div class="ai-hist-hd">
        <span class="ai-hist-title">
          <i class="ti ti-history" aria-hidden="true"></i>
          채팅 기록
        </span>
        <button class="ai-hist-new-btn" id="aiHistNewBtn" type="button" aria-label="새 채팅">
          <i class="ti ti-edit" aria-hidden="true"></i>
          새 채팅
        </button>
      </div>
      <div class="ai-hist-list" id="aiHistList">
        <div class="ai-hist-empty" id="aiHistEmpty">
          <i class="ti ti-message-off" aria-hidden="true"></i>
          <span>채팅 기록이 없습니다</span>
        </div>
      </div>
    </aside>

    <div class="ai-page" id="ai-page">
      <div id="ai-status-banner" class="ai-status-banner" hidden role="status"></div>
      <div class="ai-hd">
        <div class="ai-hd-top">
          <button class="ai-hist-toggle" id="aiHistToggle" type="button" aria-label="채팅 기록 열기">
            <i class="ti ti-layout-sidebar" aria-hidden="true"></i>
          </button>
          <div class="ai-hd-logo">
            <div class="ai-hd-logo-av"><img src="assets/gmlogo.png" alt="골목대장"></div>
            <div>
              <div class="ai-hd-logo-text">골목대장 AI</div>
              <div class="ai-hd-logo-sub">소상공인 상권 전문 AI</div>
            </div>
          </div>
          <div class="ai-hd-actions">
            <button type="button" class="ai-hd-btn" onclick="window.newAIChat()">
              <i class="ti ti-plus"></i> 새 채팅
            </button>
            <button type="button" class="ai-hd-btn" onclick="window.goBackFromAI()">
              <i class="ti ti-x"></i>
            </button>
          </div>
        </div>
        <div class="ai-hd-title">
          <h1><em>골목대장 AI</em>에게 물어보세요</h1>
          <p>상권·통계·정책 지원, 무엇이든 물어보세요</p>
        </div>
      </div>

      <div class="ai-messages" id="ai-messages">
        <div class="msg-ai" id="welcome-msg">
          <div class="msg-ai-av"><img src="assets/gmlogo.png" alt="골목대장" class="ai-av-img" width="34" height="34"></div>
          <div class="msg-ai-body">
            <div class="msg-ai-name">골목대장 AI</div>
            <div class="msg-ai-bubble intro">
              안녕하세요, 대장님! 상권·통계·정책 질문 무엇이든 물어보세요.<br>
              상권 질문은 지역(행정동)을 함께 알려주세요 📍
            </div>
          </div>
        </div>
      </div>

      <div class="ai-examples" id="ai-examples"></div>

      <div class="ai-input-area">
        <div class="ai-input-wrap">
          <textarea id="ai-input" class="ai-textarea" rows="1" maxlength="300"
            placeholder="궁금한 점을 입력해주세요..."
            oninput="window.handleInputChange(this)"
            onkeydown="window.handleKeyDown(event)"></textarea>
          <button type="button" class="ai-voice-btn" id="voice-btn"
            onclick="window.toggleVoice()" title="음성 입력">
            <i class="ti ti-microphone"></i>
          </button>
          <button type="button" class="ai-send-btn" id="send-btn" disabled
            onclick="window.sendAIMessage()">
            <i class="ti ti-send"></i>
          </button>
        </div>
        <div class="ai-input-hint">
          <div class="ai-input-hint-left">
            <i class="ti ti-shield-check"></i> 소진공 API 데이터 기반
          </div>
          <div><span class="ai-char-count" id="char-count">0</span>/300</div>
        </div>
      </div>
    </div>
  </div>
</template>

<div class="voice-overlay" id="voice-overlay">
  <div class="voice-circle">🎤</div>
  <div class="voice-text">듣고 있어요...</div>
  <div class="voice-sub">말씀하신 내용이 자동으로 입력됩니다</div>
  <div class="voice-result" id="voice-result">음성을 인식하는 중입니다...</div>
  <button type="button" class="voice-cancel" onclick="window.cancelVoice()">취소</button>
</div>

<script type="module" src="../js/shell_loader.js?v=20260680"></script>
<script type="module" src="js/auth.js?v=20260680"></script>
<script type="module" src="../js/ai-chat.js?v=20260690"></script>
<script src="../js/ai-chat-history.js?v=20260001"></script>
</body>
</html>
