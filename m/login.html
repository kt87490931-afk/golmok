<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="js/desktop-route.js"></script>
<title>골목대장 — 로그인</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css">
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap');
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Noto Sans KR',sans-serif;background:#F7F3EB;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;}
.card{background:#fff;border:1px solid #E8E4DC;border-radius:16px;padding:28px;width:100%;max-width:400px;box-shadow:0 4px 20px rgba(0,0,0,.08);}
.logo{display:flex;align-items:center;gap:10px;margin-bottom:20px;}
.logo img{width:44px;height:44px;border-radius:50%;object-fit:contain;background:#FFF8E7;border:2px solid #F5A623;padding:3px;}
h1{font-size:20px;color:#C17F24;}
.sub{font-size:12px;color:#555;margin-top:4px;}
.btn{width:100%;padding:12px;border-radius:12px;border:1px solid #E8E4DC;background:#fff;font-size:14px;font-weight:500;cursor:pointer;margin-top:10px;display:flex;align-items:center;justify-content:center;gap:8px;}
.btn-google{background:#fff;}
.btn-kakao{background:#FEE500;border-color:#FEE500;}
.btn-naver{background:#03C75A;border-color:#03C75A;color:#fff;}
.note{font-size:11px;color:#999;margin-top:16px;line-height:1.5;}
.back{display:inline-block;margin-top:16px;font-size:13px;color:#C17F24;text-decoration:none;}
</style>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../css/main-v3.css?v=20260663">
<link rel="stylesheet" href="../css/shell-pages.css?v=20260663">
<link rel="stylesheet" href="../css/main-v3-m.css?v=20260663">
</head>
<body class="m-shell" data-gm-active="home" data-gm-shell="auth">
<div class="card">
  <div class="logo">
    <img src="assets/gmlogo.png" alt="골목대장">
    <div><h1>골목대장</h1><p class="sub">우리는 모두 골목대장, 데이터로 보는 상권의 힘</p></div>
  </div>
  <button type="button" class="btn btn-google" id="btn-google-login"><i class="ti ti-brand-google"></i> Google로 시작하기</button>
  <button type="button" class="btn btn-kakao" id="btn-kakao-login">카카오 (준비중)</button>
  <button type="button" class="btn btn-naver" id="btn-naver-login">네이버 (준비중)</button>
  <a class="back" href="index.html">← 홈으로 돌아가기</a>
</div>
<script type="module" src="js/auth.js"></script>
<script type="module" src="../js/shell_loader.js?v=20260654"></script>
</body>
</html>
