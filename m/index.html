<script>
function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2200);
}

// AI 채팅 미리보기
const aiMsgs = document.getElementById('ai-messages');
const aiResponses = ['더 자세히 알려주세요!', '소진공 데이터 기준으로 분석하고 있어요.', '해당 업종의 상권 분석을 시작할게요.', '잠시만요, 데이터를 불러오고 있어요...', '좋은 질문이에요! 관련 정보를 찾아볼게요.'];
function addAiMsg(text, isUser) {
  if (!aiMsgs) return;
  const div = document.createElement('div');
  div.className = isUser ? 'chat-b user' : 'chat-b ai';
  div.textContent = text;
  aiMsgs.appendChild(div);
  aiMsgs.scrollTop = aiMsgs.scrollHeight;
}
window.sendAI = function () {
  const val = document.getElementById('ai-input')?.value?.trim();
  if (!val) return;
  addAiMsg(val, true);
  document.getElementById('ai-input').value = '';
  setTimeout(() => addAiMsg(aiResponses[Math.floor(Math.random() * aiResponses.length)], false), 700);
};
document.getElementById('ai-send-preview')?.addEventListener('click', () => window.doSearch?.());
document.getElementById('write-btn-m')?.addEventListener('click', () => document.getElementById('open-write')?.click());
</script>

<script type="module">
window.setQ = function (q) {
  const inp = document.getElementById('v4ChatInput');

};
window.doSearch = function () {
  const v = document.getElementById('v4ChatInput')?.value?.trim();
  if (!v) return;
  window.location.href = `ai-search.html?q=${encodeURIComponent(v)}`;
};
window.focusHeroSearch = function () {
  const v = document.getElementById('v4ChatInput')?.value?.trim();
  if (v) {
    window.location.href = `ai-search.html?q=${encodeURIComponent(v)}`;
    return;
  }
  document.getElementById('v4ChatInput')?.focus();
  window.scrollTo({ top: 0, behavior: 'smooth' });
};

window.changeRegion = function () { showToast('지역 변경은 프로필 설정에서 가능합니다'); };
</script>
<script>

    window.scrollTo({ top: 0, behavior: 'smooth' });
  };

  const v4AvImg = '<img src="assets/gmlogo.png" alt="골목대장" class="v4-av-img">';

  function v4AddMsg(text, isUser) {
    const div = document.createElement('div');
    if (isUser) {
      div.className = 'v4-msg-user';
      div.innerHTML = '<div class="v4-msg-user-bubble">' + text + '</div>';
    } else {
      div.className = 'v4-msg-ai';
      div.innerHTML =
        '<div class="v4-msg-avatar">' + v4AvImg + '</div>' +
        '<div class="v4-msg-wrap">' +
          '<span class="v4-msg-name">골목대장 AI</span>' +
          '<div class="v4-msg-bubble">' + text + '</div>' +
        '</div>';
    }
    v4Msgs.appendChild(div);
    v4Msgs.scrollTop = v4Msgs.scrollHeight;
  }

  function v4ShowTyping() {
    const div = document.createElement('div');
    div.className = 'v4-msg-ai';
    div.id = 'v4Typing';
    div.innerHTML =
      '<div class="v4-msg-avatar">' + v4AvImg + '</div>' +
      '<div class="v4-typing-dots"><span></span><span></span><span></span></div>';
    v4Msgs.appendChild(div);
    v4Msgs.scrollTop = v4Msgs.scrollHeight;
  }

  function v4RemoveTyping() {
    const el = document.getElementById('v4Typing');
    if (el) el.remove();
  }

  function v4HandleSend(presetText) {
    const text = presetText || v4Input.value.trim();
    if (!text) return;
    v4AddMsg(text, true);
    v4Input.value = '';
    v4ShowTyping();

    setTimeout(function() {
      v4RemoveTyping();
      window.location.href = 'ai-search.html?q=' + encodeURIComponent(text);
    }, 800);
  }

  v4Send.addEventListener('click', function() { v4HandleSend(); });
  v4Input.addEventListener('keydown', function(e) {
    if (e.key === 'Enter') v4HandleSend();
  });

  document.querySelectorAll('.v4-ex-item').forEach(function(btn) {
    btn.addEventListener('click', function() { v4HandleSend(btn.dataset.q); });
  });

  document.querySelectorAll('.v4-chip').forEach(function(btn) {
    btn.addEventListener('click', function() { v4HandleSend(btn.dataset.q); });
  });

  if (v4Mic) {
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (SR) {
      const recog = new SR();
      recog.lang = 'ko-KR';
      recog.interimResults = false;
      recog.onresult = function(e) {
        v4Input.value = e.results[0][0].transcript;
        v4Mic.classList.remove('active');
      };
      recog.onend = function() { v4Mic.classList.remove('active'); };
      v4Mic.addEventListener('click', function() {
        v4Mic.classList.toggle('active');
        if (v4Mic.classList.contains('active')) {
          recog.start();
          v4Input.placeholder = '음성 인식 중...';
        } else {
          recog.stop();
          v4Input.placeholder = '예: 동탄에서 카페 창업하면 어떨까요?';
        }
      });
    } else {
      v4Mic.style.display = 'none';
    }
  }
  }

  if (document.body.dataset.gmShellDone === '1') {
    v4Boot();
  } else {
    document.addEventListener('gm-shell-ready', v4Boot, { once: true });
  }

})();
</script>
</body>
</html>
