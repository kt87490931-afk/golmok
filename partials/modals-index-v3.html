<!-- 홈 전용: 상권분석 Mock 오버레이 (analysis.js) -->
<div class="modal-bg" id="analysis-overlay">
  <div class="analysis-modal-panel" style="background:#fff;padding:20px;margin:0;">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;">
      <div style="font-size:17px;font-weight:700;"><i class="ti ti-map"></i> 상권분석</div>
      <button type="button" id="close-analysis-overlay" style="background:none;border:none;font-size:22px;cursor:pointer;color:#999;"><i class="ti ti-x"></i></button>
    </div>
    <div id="analysis-wizard">
      <div id="analysis-wizard-body"></div>
    </div>
    <div id="analysis-result" style="display:none;">
      <div style="width:100%;height:360px;border-radius:14px;overflow:hidden;border:1px solid #E8E4DC;margin-bottom:16px;position:relative;">
        <iframe id="analysis-map-iframe" style="width:100%;height:100%;border:none;display:none;" title="소진공 상권지도" loading="lazy" allow="geolocation"></iframe>
        <div id="analysis-map-loading" style="width:100%;height:100%;display:flex;align-items:center;justify-content:center;background:#F7F3EB;color:#999;font-size:14px;">지도를 불러오는 중...</div>
      </div>
      <div id="theme-analysis-wrap"></div>
      <div style="background:#FFF8E7;border-radius:12px;padding:12px 16px;margin-bottom:16px;border:1px solid #FAC775;">
        <div style="font-size:12px;color:#8B5A10;margin-bottom:4px;">분석 조건</div>
        <div id="analysis-condition" style="font-size:14px;font-weight:700;color:#C17F24;"></div>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px;">
        <div style="background:#EBF4FF;border-radius:12px;padding:14px;border:1px solid #C5DFFF;">
          <div style="font-size:11px;color:#378ADD;margin-bottom:4px;"><i class="ti ti-users"></i> 일 평균 유동인구</div>
          <div id="stat-population" style="font-size:22px;font-weight:700;"></div>
          <div id="stat-population-change" style="font-size:11px;margin-top:3px;"></div>
        </div>
        <div style="background:#FFF8E7;border-radius:12px;padding:14px;border:1px solid #FAC775;">
          <div style="font-size:11px;color:#C17F24;margin-bottom:4px;"><i class="ti ti-chart-bar"></i> 월 평균 매출</div>
          <div id="stat-revenue" style="font-size:22px;font-weight:700;"></div>
          <div id="stat-revenue-change" style="font-size:11px;margin-top:3px;"></div>
        </div>
        <div style="background:#FFF1F1;border-radius:12px;padding:14px;border:1px solid #FFD0D0;grid-column:1/-1;">
          <div style="font-size:11px;color:#E24B4A;margin-bottom:4px;"><i class="ti ti-store"></i> 동종 업소수</div>
          <div style="display:flex;align-items:center;justify-content:space-between;">
            <div id="stat-stores" style="font-size:22px;font-weight:700;"></div>
            <div id="stat-stores-change" style="font-size:11px;"></div>
          </div>
        </div>
      </div>
      <div style="background:#fff;border-radius:12px;padding:14px;border:1px solid #E8E4DC;margin-bottom:12px;">
        <div style="font-size:13px;font-weight:700;margin-bottom:12px;">⏰ 시간대별 유동인구</div>
        <div id="hourly-chart" style="display:flex;gap:6px;align-items:flex-end;height:80px;"></div>
        <div id="peak-info" style="font-size:12px;color:#555;margin-top:10px;padding:8px 12px;background:#FFF8E7;border-radius:8px;"></div>
      </div>
      <div style="background:linear-gradient(135deg,#F5A623,#E8920E);border-radius:12px;padding:14px;">
        <div style="font-size:12px;color:rgba(255,255,255,.85);margin-bottom:6px;"><i class="ti ti-robot"></i> 골목대장 AI 분석 <span id="analysis-mode-badge" style="background:rgba(255,255,255,.25);padding:1px 7px;border-radius:10px;font-size:10px;font-weight:700;margin-left:4px;">...</span></div>
        <div id="ai-comment" style="font-size:13px;color:#fff;line-height:1.7;"></div>
      </div>
      <button type="button" id="btn-reset-analysis" style="width:100%;margin-top:12px;background:#fff;border:1px solid #E8E4DC;border-radius:12px;padding:12px;font-size:14px;color:#555;cursor:pointer;"><i class="ti ti-search"></i> 다시 검색</button>
    </div>
  </div>
</div>
