<!-- ── 우측 위젯 (PC) ── -->
<aside class="aside">

  <!-- AI 위젯 -->
  <div class="ai-widget">
    <div class="ai-widget-hd">
      <i class="ti ti-robot" style="color:var(--gold);font-size:16px"></i>
      <span>골목대장 AI 검색</span>
    </div>
    <div class="ai-widget-sub">상권·창업 무엇이든 물어보세요</div>
    <div class="ai-chips">
      <span class="ai-chip" onclick="setQ('유동인구 많은 곳')">유동인구 많은 곳</span>
      <span class="ai-chip" onclick="setQ('창업 성공률')">창업 성공률</span>
      <span class="ai-chip" onclick="setQ('지원금 신청')">지원금 신청</span>
    </div>
    <div class="ai-inp-row">
      <input type="text" placeholder="메시지 입력..." id="ai-widget-input"
        onkeydown="if(event.key==='Enter'){const v=this.value.trim();if(v){setQ(v);this.value='';doSearch();}}">
      <button type="button" class="ai-send" id="ai-widget-send"
        onclick="const v=document.getElementById('ai-widget-input')?.value?.trim();if(v){setQ(v);document.getElementById('ai-widget-input').value='';doSearch();}">
        <i class="ti ti-send"></i>
      </button>
    </div>
  </div>

  <!-- 인기 검색 상권 -->
  <div class="widget">
    <div class="widget-title">
      <i class="ti ti-trending-up"></i> 인기 검색 상권
      <span class="widget-more">더보기</span>
    </div>
    <div id="popular-areas-list-aside">
      <div class="rank-row"><span class="rank-n">1</span><span class="rank-name">동탄 센트럴파크</span><span class="rank-tag up">급상승</span></div>
      <div class="rank-row"><span class="rank-n">2</span><span class="rank-name">수원 행궁동</span><span class="rank-tag hot">인기</span></div>
      <div class="rank-row"><span class="rank-n">3</span><span class="rank-name">화성 봉담읍</span><span class="rank-tag new">신규</span></div>
      <div class="rank-row"><span class="rank-n">4</span><span class="rank-name">수원 인계동</span></div>
      <div class="rank-row"><span class="rank-n">5</span><span class="rank-name">오산 세마동</span></div>
    </div>
  </div>

  <!-- 지금 뜨는 글 -->
  <div class="widget">
    <div class="widget-title">
      <i class="ti ti-flame"></i> 지금 뜨는 글
      <a href="@@COMMUNITY@@" class="widget-more">전체보기</a>
    </div>
    <div id="hot-posts-list">
      <div style="text-align:center;padding:16px;color:var(--gray-5);font-size:12px;">불러오는 중...</div>
    </div>
  </div>

  <!-- 이웃 대장님 -->
  <div class="widget">
    <div class="widget-title">
      <i class="ti ti-users"></i> 이웃 대장님
      <span class="widget-more">더보기</span>
    </div>
    <div id="neighbor-list">
      <div style="text-align:center;padding:16px;color:var(--gray-5);font-size:12px;">불러오는 중...</div>
    </div>
  </div>

</aside>
