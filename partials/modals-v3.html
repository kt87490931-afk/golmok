<div class="modal-bg" id="write-modal">
  <div class="modal">
    <div class="modal-head">
      <span class="modal-title">게시글 작성</span>
      <button class="modal-close" id="close-modal" type="button"><i class="ti ti-x"></i></button>
    </div>
    <div class="write-cats" style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px;">
      <button type="button" class="cat-select-btn" data-cat="info">정보공유</button>
      <button type="button" class="cat-select-btn act" data-cat="qna">질문·고민</button>
      <button type="button" class="cat-select-btn" data-cat="startup">창업준비</button>
      <button type="button" class="cat-select-btn" data-cat="issue">이슈</button>
      <button type="button" class="cat-select-btn" data-cat="event">이벤트</button>
    </div>
    <input id="post-title" type="text" placeholder="제목 (선택)" style="width:100%;border:1px solid var(--border);border-radius:10px;padding:10px 14px;font-size:13px;margin-bottom:8px;outline:none;font-family:inherit;">
    <textarea id="post-content" placeholder="대장님들과 이야기를 나눠보세요..."></textarea>
    <div id="write-auto-tags" class="write-auto-tags"></div>
    <input type="file" id="image-file-input" accept="image/*" multiple style="display:none;">
    <div id="image-preview-wrap" style="display:none;gap:8px;flex-wrap:wrap;margin-top:8px;"></div>
    <div id="event-date-wrap" style="display:none;margin-top:8px;">
      <label style="font-size:12px;color:var(--text3);">이벤트 종료일</label>
      <input id="event-end-date" type="date" style="width:100%;border:1px solid var(--border);border-radius:10px;padding:8px 14px;font-size:13px;margin-top:4px;">
    </div>
    <div class="modal-acts">
      <button type="button" class="mab" id="btn-photo-upload"><i class="ti ti-photo"></i> 사진 <span id="image-count" style="color:#F5A623;"></span></button>
      <button type="button" class="mab" id="btn-location-tag"><i class="ti ti-map-pin"></i> 위치</button>
      <button type="button" class="mab" id="btn-upjong-tag"><i class="ti ti-tag"></i> 업종태그</button>
      <button type="button" class="mab"><i class="ti ti-speakerphone"></i> 이벤트</button>
      <button class="modal-submit" id="submit-post" type="button">게시하기</button>
    </div>
  </div>
</div>

<div class="modal-bg" id="my-activity-overlay">
  <div class="activity-modal-panel" style="background:#fff;width:100%;display:flex;flex-direction:column;overflow:hidden;">
    <div style="width:36px;height:4px;background:#E8E4DC;border-radius:4px;margin:16px auto 0;"></div>
    <div style="padding:16px 20px;border-bottom:1px solid #E8E4DC;display:flex;align-items:center;justify-content:space-between;">
      <div style="font-size:16px;font-weight:700;">내 활동</div>
      <button type="button" id="close-activity-overlay" style="background:none;border:none;font-size:22px;cursor:pointer;color:#999;"><i class="ti ti-x"></i></button>
    </div>
    <div style="display:flex;border-bottom:1px solid #E8E4DC;">
      <button type="button" class="activity-tab act" data-tab="my-posts" style="flex:1;padding:12px 0;border:none;background:none;cursor:pointer;font-size:14px;font-weight:500;border-bottom:2px solid #F5A623;color:#C17F24;">내 게시글</button>
      <button type="button" class="activity-tab" data-tab="saved-posts" style="flex:1;padding:12px 0;border:none;background:none;cursor:pointer;font-size:14px;color:#999;border-bottom:2px solid transparent;">저장한 글</button>
    </div>
    <div id="activity-list" style="flex:1;overflow-y:auto;padding:12px 16px;"></div>
  </div>
</div>

<div class="modal-bg" id="notification-overlay">
  <div class="notification-modal-panel">
    <div style="padding:16px 20px;border-bottom:1px solid #E8E4DC;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;">
      <div style="font-size:16px;font-weight:700;"><i class="ti ti-bell"></i> 알림</div>
      <button type="button" id="close-notification-overlay" style="background:none;border:none;font-size:22px;cursor:pointer;color:#999;"><i class="ti ti-x"></i></button>
    </div>
    <div id="notification-list" style="flex:1;overflow-y:auto;padding:12px 20px;"></div>
  </div>
</div>
