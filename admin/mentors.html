<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>멘토 관리 - 골목대장 어드민</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css">

</head>
<body>
<div class="admin-wrap">
  <div class="admin-main">
    <div class="admin-topbar">
      <div class="admin-page-title" id="admin-page-title">멘토 관리</div>
    </div>
    <div class="admin-content">
      <div class="coming-soon-banner">
        <div class="icon">🏆</div>
        <h3>멘토 관리</h3>
        <p>
          공식 멘토 신청 심사, 등급 관리,<br>
          멘토링 활동 현황을 관리합니다.<br><br>
          멘토링 플랫폼 오픈 후 활성화됩니다.
        </p>
      </div>
      <div class="admin-card">
        <div class="admin-card-title"><i class="ti ti-award"></i> 멘토 등급 구조</div>
        <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:12px;">
          <div style="text-align:center;padding:16px;background:#F7F3EB;border-radius:10px;">
            <div style="font-size:24px;margin-bottom:6px;">🏪</div>
            <div style="font-size:13px;font-weight:700;">일반 대장님</div>
            <div style="font-size:11px;color:#999;margin-top:4px;">기본</div>
          </div>
          <div style="text-align:center;padding:16px;background:#FFF8E7;border-radius:10px;">
            <div style="font-size:24px;margin-bottom:6px;">✅</div>
            <div style="font-size:13px;font-weight:700;">인증 대장님</div>
            <div style="font-size:11px;color:#999;margin-top:4px;">경력 3년+</div>

          <div style="text-align:center;padding:16px;background:#FFF8E7;border-radius:10px;border:2px solid #F5A623;">
            <div style="font-size:24px;margin-bottom:6px;">⭐</div>
            <div style="font-size:13px;font-weight:700;color:#C17F24;">공식 멘토</div>
            <div style="font-size:11px;color:#999;margin-top:4px;">직접 심사</div>

        </div>

    </div>
  </div>
</div>
<script type="module">
import { requireAdmin } from './js/admin-auth.js?v=20260616';
import { initAdminPage } from './js/admin.js?v=20260616';
document.addEventListener('DOMContentLoaded', async () => {
  const admin = await requireAdmin();
  if (!admin) return;
  await initAdminPage({ activePage: 'mentors', pageTitle: '멘토 관리', adminUser: admin });
});
