<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>API 관리 - 골목대장 어드민</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css">
<link rel="stylesheet" href="css/admin.css">
</head>
<body>
<div class="admin-wrap">
  <div class="admin-main">
    <div class="admin-topbar">
      <div class="admin-page-title" id="admin-page-title">API 관리</div>
    </div>
    <div class="admin-content">
      <div class="coming-soon-banner">
        <div class="icon">🔌</div>
        <h3>API 관리</h3>
        <p>
          소진공 OpenAPI, 카카오맵, 네이버·카카오 로그인 등<br>
          API 키 등록 및 호출 현황을 관리합니다.<br><br>
          소진공 API 승인 후 활성화됩니다.
        </p>
      </div>
      <div class="admin-card">
        <div class="admin-card-title"><i class="ti ti-plug"></i> 등록된 API</div>
        <table class="admin-table">
          <thead>
            <tr><th>API 이름</th><th>키 (마스킹)</th><th>상태</th><th>모드</th><th>마지막 수정</th><th>관리</th></tr>
          </thead>
          <tbody>
            <tr>
              <td><b>소진공 상권정보 API</b></td>
              <td style="color:#999;">미등록</td>
              <td><span class="badge badge-pending">대기</span></td>
              <td><span style="background:#FFF8E7;color:#C17F24;padding:2px 8px;border-radius:10px;font-size:11px;">Mock</span></td>
              <td style="color:#999;">-</td>
              <td><button type="button" class="btn-secondary" disabled>설정</button></td>
            </tr>
            <tr>
              <td><b>카카오맵 SDK</b></td>
              <td style="color:#999;">미등록</td>
              <td><span class="badge badge-pending">대기</span></td>
              <td>-</td>
              <td style="color:#999;">-</td>
              <td><button type="button" class="btn-secondary" disabled>설정</button></td>
            </tr>
            <tr>
              <td><b>Gemini API</b></td>
              <td style="color:#999;">미등록</td>
              <td><span class="badge badge-pending">대기</span></td>
              <td>-</td>
              <td style="color:#999;">-</td>
              <td><button type="button" class="btn-secondary" disabled>설정</button></td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
</div>
<script type="module">
import { requireAdmin } from './js/admin-auth.js';
import { initAdminPage } from './js/admin.js';
document.addEventListener('DOMContentLoaded', async () => {
  const admin = await requireAdmin();
  if (!admin) return;
  await initAdminPage({ activePage: 'api', pageTitle: 'API 관리', adminUser: admin });
});
</script>
</body>
</html>
