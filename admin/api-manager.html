<!DOCTYPE html>

<html lang="ko">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>API 관리 - 골목대장 어드민</title>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css">

<link rel="stylesheet" href="css/admin.css">

</head>

<body>

<div class="admin-wrap">

  <div class="admin-main">

    <div class="admin-topbar">

      <div class="admin-page-title" id="admin-page-title">API 관리</div>

    </div>

    <div class="admin-content">

      <div class="admin-card">

        <div class="admin-card-title"><i class="ti ti-settings"></i> API 제어</div>

        <div style="display:flex;gap:16px;flex-wrap:wrap;">

          <div style="display:flex;align-items:center;gap:12px;padding:14px 20px;background:#F7F3EB;border-radius:12px;border:1px solid #E8E4DC;">

            <div>

              <div style="font-size:14px;font-weight:500;">API 전체 ON/OFF</div>

              <div style="font-size:12px;color:#999;">비용 급증 시 즉시 차단</div>

            </div>

            <button type="button" id="btn-api-toggle" style="padding:8px 18px;border-radius:20px;border:none;font-size:13px;font-weight:700;cursor:pointer;background:#1D9E75;color:#fff;">ON</button>

          </div>

          <div style="display:flex;align-items:center;gap:12px;padding:14px 20px;background:#F7F3EB;border-radius:12px;border:1px solid #E8E4DC;">

            <div>

              <div style="font-size:14px;font-weight:500;">데이터 모드</div>

              <div style="font-size:12px;color:#999;">Mock ↔ Real 전환</div>

            </div>

            <button type="button" id="btn-mode-toggle" style="padding:8px 18px;border-radius:20px;border:none;font-size:13px;font-weight:700;cursor:pointer;background:#F5A623;color:#fff;">Mock</button>

          </div>

          <div style="padding:14px 20px;background:#FFF1F1;border-radius:12px;border:1px solid #FFD0D0;">

            <div style="font-size:14px;font-weight:500;color:#E24B4A;">⏰ API 만료일</div>

            <div style="font-size:13px;color:#E24B4A;font-weight:700;">2026-09-30</div>

            <div style="font-size:11px;color:#999;margin-top:2px;">정식 승인을 위해 증빙서류 제출 필요</div>

          </div>

        </div>

      </div>

      <div class="admin-card">

        <div class="admin-card-title"><i class="ti ti-key"></i> 등록된 API 키</div>

        <p style="font-size:12px;color:#999;margin-bottom:12px;">키는 Git에 저장하지 마세요. <code>sql/sojanggong_app_settings.sql</code> 실행 후 Supabase에서 실제 키로 수정하세요.</p>

        <table class="admin-table">

          <thead>

            <tr><th>API / 항목</th><th>상태</th><th>값</th><th>설명</th><th>관리</th></tr>

          </thead>

          <tbody id="settings-tbody">

            <tr><td colspan="5" style="text-align:center;padding:20px;color:#999;">로딩 중...</td></tr>

          </tbody>

        </table>

      </div>

    </div>

  </div>

</div>

<script type="module">

import { requireAdmin } from './js/admin-auth.js?v=20260629';

import { initAdminPage } from './js/admin.js?v=20260675';

import { loadApiSettings, bindApiManagerUI } from './js/api-manager-admin.js?v=20260630';



document.addEventListener('DOMContentLoaded', async () => {

  const admin = await requireAdmin();

  if (!admin) return;

  await initAdminPage({ activePage: 'api', pageTitle: 'API 관리', adminUser: admin });

  bindApiManagerUI();

  await loadApiSettings();

});

</script>

</body>

</html>
