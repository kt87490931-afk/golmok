<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI 관리 - 골목대장 어드민</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css">
<link rel="stylesheet" href="css/admin.css">
</head>
<body>
<div class="admin-wrap">
  <div class="admin-main">
    <div class="admin-topbar">
      <div class="admin-page-title" id="admin-page-title">AI 관리</div>
    </div>
    <div class="admin-content">
      <div class="admin-card">
        <div class="admin-card-title"><i class="ti ti-chart-dots"></i> AI 사용 현황</div>
        <div id="ai-stats-root"><p style="color:#999;">불러오는 중...</p></div>
      </div>

      <div class="admin-card">
        <div class="admin-card-title"><i class="ti ti-robot"></i> Gemini AI 설정</div>
        <p style="font-size:13px;color:#666;margin-bottom:12px;line-height:1.6;">
          소진공 API 데이터만 답변하는 RAG 구조입니다. <strong>Gemini API 키</strong>는 마지막에 등록하세요.
          키 없이도 ON/OFF·한도·모델·지역코드 설정은 가능합니다.
        </p>
        <div id="ai-settings-root"></div>
      </div>

      <div class="admin-card">
        <div class="admin-card-title"><i class="ti ti-map-pin"></i> 행정동 지역 코드</div>
        <p style="font-size:13px;color:#666;margin-bottom:12px;">
          AI 질문의 지역명 → 소진공 <code>regionCode</code> 매핑 (Edge Function에서 사용)
        </p>
        <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:8px;margin-bottom:14px;">
          <input type="text" id="region-sido" placeholder="시도 (경기)" style="padding:8px;border:1px solid #E8E4DC;border-radius:8px;font-size:12px;">
          <input type="text" id="region-sigungu" placeholder="시군구 (화성시)" style="padding:8px;border:1px solid #E8E4DC;border-radius:8px;font-size:12px;">
          <input type="text" id="region-name" placeholder="행정동명 *" style="padding:8px;border:1px solid #E8E4DC;border-radius:8px;font-size:12px;">
          <input type="text" id="region-code" placeholder="regionCode *" style="padding:8px;border:1px solid #E8E4DC;border-radius:8px;font-size:12px;">
          <input type="text" id="region-aliases" placeholder="별칭 (쉼표구분)" style="padding:8px;border:1px solid #E8E4DC;border-radius:8px;font-size:12px;grid-column:span 2;">
        </div>
        <button type="button" id="btn-region-add" style="padding:8px 16px;border:none;border-radius:8px;background:#F5A623;color:#fff;font-weight:600;cursor:pointer;margin-bottom:16px;">+ 지역 추가</button>
        <div style="overflow-x:auto;">
          <table class="admin-table" style="width:100%;font-size:12px;">
            <thead>
              <tr>
                <th>시도</th><th>시군구</th><th>지역명</th><th>코드</th><th>별칭</th><th>상태</th>
              </tr>
            </thead>
            <tbody id="region-codes-tbody"></tbody>
          </table>
        </div>
      </div>

      <div class="admin-card">
        <div class="admin-card-title"><i class="ti ti-list"></i> 최근 AI 호출 로그</div>
        <div style="overflow-x:auto;">
          <table class="admin-table" style="width:100%;font-size:12px;">
            <thead>
              <tr>
                <th>시간</th><th>질문</th><th>의도</th><th>API</th><th>상태</th>
              </tr>
            </thead>
            <tbody id="ai-logs-tbody"></tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
</div>
<script type="module">
import { requireAdmin } from './js/admin-auth.js?v=20260681';
import { initAdminPage } from './js/admin.js?v=20260681';
import { loadAIManager, bindRegionForm } from './js/ai-manager-admin.js?v=20260681';

const adminUser = await requireAdmin();
await initAdminPage({ activePage: 'ai', pageTitle: 'AI 관리', adminUser });
bindRegionForm();
await loadAIManager();
</script>
</body>
</html>
