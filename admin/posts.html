<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>게시글 관리 - 골목대장 어드민</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css">
<link rel="stylesheet" href="css/admin.css">
</head>
<body>
<div class="admin-wrap">
  <div class="admin-main">
    <div class="admin-topbar">
      <div class="admin-page-title" id="admin-page-title">게시글 관리</div>
      <div id="post-count" style="font-size:13px;color:#999;">총 0개</div>
    </div>
    <div class="admin-content">
      <div class="cat-filter-row">
        <button type="button" class="post-cat-btn active" data-cat="all">전체</button>
        <button type="button" class="post-cat-btn" data-cat="qna">질문·고민</button>
        <button type="button" class="post-cat-btn" data-cat="info">정보공유</button>
        <button type="button" class="post-cat-btn" data-cat="startup">창업준비</button>
        <button type="button" class="post-cat-btn" data-cat="issue">이슈</button>
        <button type="button" class="post-cat-btn" data-cat="event">이벤트</button>
      </div>
      <div class="search-bar">
        <input type="text" id="post-search" placeholder="내용, 제목, 작성자 검색...">
      </div>
      <div class="admin-card" style="padding:0;overflow:hidden;">
        <table class="admin-table">
          <thead>
            <tr>
              <th>게시글</th>
              <th>카테고리</th>
              <th>반응</th>
              <th>작성일</th>
              <th>상태</th>
              <th>관리</th>
            </tr>
          </thead>
          <tbody id="posts-tbody">
            <tr><td colspan="6" style="text-align:center;color:#999;padding:30px;">로딩 중...</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
</div>
<script type="module">
import { supabase, requireAdmin, showAdminToast, escapeHtml } from './js/admin-auth.js?v=20260616';
import { initAdminPage } from './js/admin.js?v=20260616';

let currentCategory = 'all';
let searchQuery = '';

const catLabels = {
  all: '전체',
  qna: '질문·고민',
  info: '정보공유',
  startup: '창업준비',
  issue: '이슈',
  event: '이벤트',
};

async function loadPosts() {
  let query = supabase
    .from('posts')
    .select('id, title, content, category, like_count, comment_count, view_count, is_deleted, is_pinned, created_at, region_dong, users(nickname, email)')
    .order('created_at', { ascending: false })
    .limit(100);

  if (currentCategory !== 'all') query = query.eq('category', currentCategory);

  const { data: posts, error } = await query;
  if (error) {
    console.error(error);
    showAdminToast('게시글을 불러오지 못했습니다', 'error');
    return;
  }

  let filtered = posts || [];
  if (searchQuery) {
    filtered = filtered.filter(
      (p) =>
        p.content?.includes(searchQuery) ||
        p.title?.includes(searchQuery) ||
        p.users?.nickname?.includes(searchQuery)
    );
  }

  const tbody = document.getElementById('posts-tbody');
  const countEl = document.getElementById('post-count');
  if (countEl) countEl.textContent = `총 ${filtered.length}개`;
  if (!tbody) return;

  if (!filtered.length) {
    tbody.innerHTML = '<tr><td colspan="6" style="text-align:center;padding:30px;color:#999;">게시글이 없습니다</td></tr>';
    return;
  }

  tbody.innerHTML = filtered
    .map(
      (post) => `<tr style="${post.is_deleted ? 'opacity:.5;background:#FFF1F1;' : ''}">
      <td style="max-width:220px;">
        <div style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:13px;">
          ${post.is_pinned ? '<span style="color:#F5A623;margin-right:4px;">📌</span>' : ''}
          ${escapeHtml(post.title || post.content?.slice(0, 40) || '-')}
        </div>
        <div style="font-size:11px;color:#999;margin-top:2px;">${escapeHtml(post.region_dong || '')} · ${escapeHtml(post.users?.nickname || '-')}</div>
      </td>
      <td><span style="background:#FFF8E7;color:#C17F24;padding:2px 7px;border-radius:10px;font-size:11px;">${catLabels[post.category] || post.category}</span></td>
      <td style="font-size:12px;color:#999;text-align:center;">👁${post.view_count || 0} ❤️${post.like_count || 0} 💬${post.comment_count || 0}</td>
      <td style="font-size:12px;color:#999;">${new Date(post.created_at).toLocaleDateString('ko-KR')}</td>
      <td><span class="badge ${post.is_deleted ? 'badge-suspended' : 'badge-active'}">${post.is_deleted ? '삭제됨' : '게시중'}</span></td>
      <td>
        <div style="display:flex;gap:5px;flex-wrap:wrap;">
          ${
            !post.is_deleted
              ? `<button type="button" class="btn-danger" data-action="delete" data-id="${post.id}">삭제</button>
                 <button type="button" class="btn-secondary" data-action="pin" data-id="${post.id}" data-pinned="${!!post.is_pinned}">${post.is_pinned ? '고정해제' : '상단고정'}</button>`
              : `<button type="button" class="btn-secondary" data-action="restore" data-id="${post.id}">복구</button>`
          }
        </div>
      </td>
    </tr>`
    )
    .join('');

  tbody.querySelectorAll('[data-action="delete"]').forEach((btn) => {
    btn.addEventListener('click', () => deletePost(btn.dataset.id));
  });
  tbody.querySelectorAll('[data-action="restore"]').forEach((btn) => {
    btn.addEventListener('click', () => restorePost(btn.dataset.id));
  });
  tbody.querySelectorAll('[data-action="pin"]').forEach((btn) => {
    btn.addEventListener('click', () => togglePin(btn.dataset.id, btn.dataset.pinned === 'true'));
  });
}

async function deletePost(postId) {
  if (!window.confirm('이 게시글을 삭제하시겠습니까?')) return;
  const { error } = await supabase.from('posts').update({ is_deleted: true }).eq('id', postId);
  if (error) {
    showAdminToast('삭제에 실패했습니다', 'error');
    return;
  }
  showAdminToast('게시글이 삭제되었습니다');
  loadPosts();
}

async function restorePost(postId) {
  const { error } = await supabase.from('posts').update({ is_deleted: false }).eq('id', postId);
  if (error) {
    showAdminToast('복구에 실패했습니다', 'error');
    return;
  }
  showAdminToast('게시글이 복구되었습니다', 'info');
  loadPosts();
}

async function togglePin(postId, isPinned) {
  const { error } = await supabase.from('posts').update({ is_pinned: !isPinned }).eq('id', postId);
  if (error) {
    showAdminToast('처리에 실패했습니다', 'error');
    return;
  }
  showAdminToast(isPinned ? '고정이 해제되었습니다' : '상단에 고정되었습니다');
  loadPosts();
}

document.querySelectorAll('.post-cat-btn').forEach((btn) => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.post-cat-btn').forEach((b) => b.classList.remove('active'));
    btn.classList.add('active');
    currentCategory = btn.dataset.cat;
    loadPosts();
  });
});

document.getElementById('post-search')?.addEventListener('input', (e) => {
  searchQuery = e.target.value.trim();
  loadPosts();
});

document.addEventListener('DOMContentLoaded', async () => {
  const admin = await requireAdmin();
  if (!admin) return;
  await initAdminPage({ activePage: 'posts', pageTitle: '게시글 관리', adminUser: admin });
  await loadPosts();
});
</script>
</body>
</html>
